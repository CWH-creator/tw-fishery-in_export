<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>臺灣水產品進出口貿易統計</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:#f5f4f1;color:#1a1a1a;padding:16px}
h1{font-size:24px;font-weight:700;color:#0f172a;margin-bottom:8px;letter-spacing:0.5px}
.info-bar{font-size:12px;color:#666;margin-bottom:14px;display:flex;gap:16px;align-items:center}

.panel{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:16px;margin-bottom:12px}
.filter-grid{display:grid;grid-template-columns:repeat(3, minmax(0, 1fr));gap:14px;align-items:start}
.fg label{display:block;font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
select{width:100%;padding:6px 10px;border:0.5px solid #ccc;border-radius:7px;font-size:13px;background:#fff;cursor:pointer}
select:focus{outline:none;border-color:#3266ad}

.date-row{display:flex; gap:4px; align-items:center;}
.date-row select{flex:1; padding:6px 4px;}

/* ── Live-search multi-select ── */
.ms-wrap{position:relative}
.ms-input-row{display:flex;align-items:center;border:0.5px solid #ccc;border-radius:7px;background:#fff;padding:4px 8px;gap:6px;cursor:text;min-height:34px;flex-wrap:wrap}
.ms-input-row:focus-within{border-color:#3266ad}
.ms-input-row input{border:none;outline:none;font-size:13px;flex:1;min-width:80px;background:transparent;padding:2px 0}
.ms-count{font-size:11px;color:#888;white-space:nowrap}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:0.5px solid #ccc;border-radius:8px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.1);max-height:260px;overflow-y:auto}
.ms-dropdown.open{display:block}
.ms-actions{display:flex;gap:6px;padding:6px 10px;border-bottom:0.5px solid #eee;position:sticky;top:0;background:#fff}
.ms-actions button{font-size:11px;padding:3px 8px;border:0.5px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;color:#555}
.ms-actions button:hover{background:#f0f0f0}
.ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;user-select:none}
.ms-item:hover{background:#f5f5f5}
.ms-item.checked{background:#eff6ff}
.ms-item input[type=checkbox]{width:14px;height:14px;accent-color:#3266ad;flex-shrink:0;cursor:pointer}
.ms-empty{padding:12px;font-size:12px;color:#aaa;text-align:center}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500}
.chip-sp{background:#dbeafe;color:#1e40af}
.chip-co{background:#fce7f3;color:#9d174d}
.chip-ty{background:#dcfce7;color:#166534}
.chip .x{cursor:pointer;opacity:.6;font-size:13px;line-height:1}
.chip .x:hover{opacity:1}

/* buttons */
.btn-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.btn-primary{padding:8px 20px;border:none;border-radius:8px;background:#3266ad;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#2557a0}
.btn-ghost{padding:8px 16px;border:0.5px solid #ccc;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:#444;white-space:nowrap;}
.btn-ghost:hover{background:#f0f0f0}
#status{font-size:12px;color:#888}

/* 專家優化：為手機版引入橫向捲動保護殼 (Responsive Table Wrapper) */
.table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 14px; border-radius: 10px; border: 0.5px solid #ddd; background: #fff; }
.metric-table{width:100%; border-collapse:separate; border-spacing:0; min-width: 500px; /* 強制最小寬度，防止擠壓 */}
.metric-table th{padding:10px 14px;font-size:12px;font-weight:700;color:#1a1a1a;text-align:right;border-bottom:1px solid #eee;background:#f8f8f6;white-space:nowrap;}
.metric-table th:first-child{text-align:left}
.metric-table td{padding:12px 14px;border-bottom:0.5px solid #f0f0f0;text-align:right;color:#1a1a1a;font-weight:500;font-size:15px;white-space:nowrap;}
.metric-table td:first-child{text-align:left;font-size:13px;font-weight:500;color:#1a1a1a;white-space:normal;line-height:1.4;}
.metric-table tr:last-child td{border-bottom:none}

.up{color:#D85A30}.dn{color:#1D9E75}.neu{color:#aaa}

/* charts */
.trend-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:14px}
.chart-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:14px}

.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:16px}
.card-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:12px}

/* 維度分頁 */
.chart-tabs { display: flex; gap: 8px; margin-bottom: 14px; border-bottom: 2px solid #eee; padding-bottom: 0px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;}
.chart-tab-btn { padding: 10px 16px; border: none; background: transparent; font-size: 14px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; white-space: nowrap; }
.chart-tab-btn:hover { color: #3266ad; }
.chart-tab-btn.active { color: #3266ad; border-bottom-color: #3266ad; }
.chart-tab-pane { display: none; }
.chart-tab-pane.active { display: grid; }

/* 明細 table */
table.detail-tbl {width:100%;border-collapse:collapse;font-size:12px; min-width: 600px;}
table.detail-tbl th{text-align:left;padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-weight:500;font-size:12px;white-space:nowrap;background:#f8f8f6;}
table.detail-tbl td{padding:8px 10px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle;white-space:nowrap;}
.io-ex{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:#dbeafe;color:#1e40af;font-weight:500}
.io-im{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:#fce7f3;color:#9d174d;font-weight:500}
.no-result{text-align:center;padding:40px;color:#aaa;font-size:13px}
#loading { text-align: center; padding: 50px; font-size: 15px; color: #3266ad; font-weight: 500; }
#app-content { display: none; }

/* 專家優化：針對手機螢幕 (寬度小於 768px) 的專屬排版校正 */
@media (max-width: 768px) {
  body { padding: 10px; }
  h1 { font-size: 20px; line-height: 1.3; }
  /* 上方資訊列改為垂直排列，避免按鈕被擠壓 */
  .info-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
  .info-bar button { margin-left: 0 !important; align-self: flex-start; padding: 6px 12px; font-size: 13px; }
  
  /* 搜尋過濾器改為單欄式直排 */
  .filter-grid, .trend-grid, .chart-grid { grid-template-columns: 1fr; }
  
  /* 分頁按鈕優化 */
  .chart-tabs { padding-bottom: 4px; }
  
  .card { padding: 12px; }
  /* 手機上微調圖表高度，增加同畫面可視資訊量 */
  .card > div[style*="height"] { height: 220px !important; }
}
</style>
</head>
<body>
<h1>🐟 臺灣水產品進出口貿易統計</h1>
<div class="info-bar">
  <span>資料來源：農業部漁業署 漁業統計年報</span>
  <span id="update-time">資料更新最新時間：同步中...</span>
  <button class="btn-ghost" onclick="fetchData()" style="padding: 2px 8px; font-size: 11px; margin-left: auto;">🔄 重新同步</button>
</div>

<div id="loading">⏳ 正在與政府雲端資料庫（Google Sheets）同步最新數據，請稍候...<br><span style="font-size:12px;color:#888;margin-top:8px;display:block;">（17萬筆大數據解析與清洗中，這可能需要幾秒鐘的時間）</span></div>

<div id="app-content">
<div class="panel">
  <div class="filter-grid">
    <div class="fg">
      <label>進出口</label>
      <select id="f-io" onchange="applyFilter()">
        <option value="">全部</option>
        <option value="出口">出口</option>
        <option value="進口">進口</option>
      </select>
    </div>
    <div class="fg">
      <label>📊 基期區間</label>
      <div class="date-row">
        <select id="b-start-yr" onchange="applyFilter()"></select>
        <select id="b-start-mo" onchange="applyFilter()"></select>
        <span style="color:#aaa;">~</span>
        <select id="b-end-yr" onchange="applyFilter()"></select>
        <select id="b-end-mo" onchange="applyFilter()"></select>
      </div>
    </div>
    <div class="fg">
      <label>🎯 當期區間</label>
      <div class="date-row">
        <select id="t-start-yr" onchange="applyFilter()"></select>
        <select id="t-start-mo" onchange="applyFilter()"></select>
        <span style="color:#aaa;">~</span>
        <select id="t-end-yr" onchange="applyFilter()"></select>
        <select id="t-end-mo" onchange="applyFilter()"></select>
      </div>
    </div>
    <div class="fg">
      <label>魚種</label>
      <div class="ms-wrap" id="wrap-sp">
        <div class="ms-input-row" id="irow-sp">
          <input id="q-sp" placeholder="關鍵字…" autocomplete="off">
          <span class="ms-count" id="cnt-sp"></span>
        </div>
        <div class="ms-dropdown" id="dd-sp"></div>
      </div>
      <div class="chips" id="chips-sp"></div>
    </div>
    <div class="fg">
      <label>國家</label>
      <div class="ms-wrap" id="wrap-co">
        <div class="ms-input-row" id="irow-co">
          <input id="q-co" placeholder="關鍵字…" autocomplete="off">
          <span class="ms-count" id="cnt-co"></span>
        </div>
        <div class="ms-dropdown" id="dd-co"></div>
      </div>
      <div class="chips" id="chips-co"></div>
    </div>
    <div class="fg">
      <label>商品類型</label>
      <div class="ms-wrap" id="wrap-ty">
        <div class="ms-input-row" id="irow-ty">
          <input id="q-ty" placeholder="關鍵字…" autocomplete="off">
          <span class="ms-count" id="cnt-ty"></span>
        </div>
        <div class="ms-dropdown" id="dd-ty"></div>
      </div>
      <div class="chips" id="chips-ty"></div>
    </div>
  </div>
  
  <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px dashed #ddd;">
    <span id="status" style="font-size:13px; font-weight:500; color:#3266ad;"></span>
    <button class="btn-ghost" onclick="resetAll()">重置全部條件</button>
  </div>
</div>

<div id="metrics"></div>

<div class="trend-grid">
  <div class="card">
    <div class="card-title" id="ct-trend-w">月別重量同期比較（公噸）</div>
    <div style="position:relative;height:260px"><canvas id="cTrendW"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title" id="ct-trend-v">月別金額同期比較（新臺幣千元）</div>
    <div style="position:relative;height:260px"><canvas id="cTrendV"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title" id="ct-trend-u" style="color:#d97706;">🎯 政策防線：月別單價趨勢（元/公斤）</div>
    <div style="position:relative;height:260px"><canvas id="cTrendU"></canvas></div>
  </div>
</div>

<div class="chart-tabs">
  <button class="chart-tab-btn active" id="btn-chart-co" onclick="switchChartTab('co')">🌍 市場與國家分析</button>
  <button class="chart-tab-btn" id="btn-chart-sp" onclick="switchChartTab('sp')">🐟 魚種與物種分析</button>
  <button class="chart-tab-btn" id="btn-chart-ty" onclick="switchChartTab('ty')">📦 商品與加工型態</button>
</div>

<div id="pane-co" class="chart-grid chart-tab-pane active">
  <div class="card"><div class="card-title" id="ct-w">重量比較（噸）</div><div style="position:relative;height:280px"><canvas id="cW"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-v">金額比較（千元）</div><div style="position:relative;height:280px"><canvas id="cV"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-u" style="color:#d97706;">單價比較（元/公斤）</div><div style="position:relative;height:280px"><canvas id="cU"></canvas></div></div>
</div>

<div id="pane-sp" class="chart-grid chart-tab-pane">
  <div class="card"><div class="card-title" id="ct-sp-w">魚種重量比較（噸）</div><div style="position:relative;height:280px"><canvas id="cSpW"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-sp-v">魚種金額比較（千元）</div><div style="position:relative;height:280px"><canvas id="cSpV"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-sp-u" style="color:#d97706;">魚種單價比較（元/公斤）</div><div style="position:relative;height:280px"><canvas id="cSpU"></canvas></div></div>
</div>

<div id="pane-ty" class="chart-grid chart-tab-pane">
  <div class="card"><div class="card-title" id="ct-ty-w">商品類型重量（噸）</div><div style="position:relative;height:280px"><canvas id="cTyW"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-ty-v">商品類型金額（千元）</div><div style="position:relative;height:280px"><canvas id="cTyV"></canvas></div></div>
  <div class="card"><div class="card-title" id="ct-ty-u" style="color:#d97706;">商品類型單價（元/公斤）</div><div style="position:relative;height:280px"><canvas id="cTyU"></canvas></div></div>
</div>

<div class="card" style="margin-top: 14px;">
  <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
    <span id="tbl-title">明細資料</span>
    <div style="display:flex; gap:8px;">
      <button class="btn-ghost" onclick="toggleTable()" id="btn-toggle-tbl">展開明細</button>
      <button class="btn-primary" onclick="exportCSV()">匯出 CSV</button>
    </div>
  </div>
  <div id="tbl" style="display:none; margin-top: 14px;"></div>
</div>
</div> 

<script>
let data = [];
let countries = [];
let species = [];
let types = [];
let msSp, msCo, msTy;
let currentAggData = []; 

const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw1fvnGvf4uQQLkxMr7EYpPE4nXMY6CngEk36YGWCv1vYqM1iLIKUt85SW486tHRc5IE7MuDTtQQqO/pub?output=csv";

function fetchData() {
  document.getElementById('app-content').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('update-time').textContent = '資料更新最新時間：同步中...';

  const fetchUrl = baseUrl + "&_t=" + new Date().getTime();

  Papa.parse(fetchUrl, {
    download: true,
    header: true,
    dynamicTyping: false, 
    skipEmptyLines: true,
    complete: function(results) {
      if (!results.data || results.data.length === 0) {
         document.getElementById('loading').textContent = '❌ 無法取得資料，請確認資料庫狀態。';
         return;
      }

      const now = new Date();
      const timeStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      document.getElementById('update-time').textContent = `資料更新最新時間：${timeStr}`;

      const keys = Object.keys(results.data[0]);
      const keyMap = {
        io: keys.find(k => /進出口|流向|io/i.test(k)),
        year: keys.find(k => /年|期|year|period/i.test(k)),
        country: keys.find(k => /國家|國別|市場|產地|country/i.test(k)),
        species: keys.find(k => /貿易物種|魚種|魚類|品名|貨品|species/i.test(k)),
        stype: keys.find(k => /商品類型|類型|型態|產品|狀態|type/i.test(k)),
        weight: keys.find(k => /重量|公噸|量|weight/i.test(k)),
        value: keys.find(k => /金額|千元|價值|值|value/i.test(k))
      };

      data = results.data.map(row => {
        const rawYearMonth = String(row[keyMap.year] || '').replace(/\D/g, '');
        const parsedNum = parseInt(rawYearMonth, 10);
        let y = 0, m = 0;
        
        if (parsedNum > 1000) { 
          y = Math.floor(parsedNum / 100);
          m = parsedNum % 100;
        } else {
          y = isNaN(parsedNum) ? 0 : parsedNum;
        }

        const rawW = String(row[keyMap.weight] || '').replace(/,/g, '');
        const rawV = String(row[keyMap.value] || '').replace(/,/g, '');

        let spName = String(row[keyMap.species] || '').trim();
        if (spName.includes('鱰魚') && !spName.includes('鬼頭刀')) {
          spName = spName.replace('鱰魚', '鱰魚（鬼頭刀）');
        }

        return {
          io: String(row[keyMap.io] || '').trim(),
          year: y,
          month: m,
          country: String(row[keyMap.country] || '').trim(),
          species: spName,
          stype: String(row[keyMap.stype] || '').trim(),
          weight: parseFloat(rawW) || 0,
          value: parseFloat(rawV) || 0
        };
      }).filter(r => r.io && r.year > 0); 

      countries = [...new Set(data.map(item => item.country))].filter(Boolean).sort();
      species = [...new Set(data.map(item => item.species))].filter(Boolean).sort();
      types = [...new Set(data.map(item => item.stype))].filter(Boolean).sort();

      initApp();
    },
    error: function(error) {
      document.getElementById('loading').textContent = '❌ 資料同步失敗，請確認您的網路狀態或 Google Sheets 共用權限設定。';
      console.error('資料載入錯誤:', error);
    }
  });
}

fetchData();

function buildMS(key, items, chipClass) {
  const selected = new Set();
  const ddEl   = document.getElementById('dd-' + key);
  const qEl    = document.getElementById('q-' + key);
  const cntEl  = document.getElementById('cnt-' + key);
  const chipsEl= document.getElementById('chips-' + key);
  const wrapEl = document.getElementById('wrap-' + key);

  function renderDD(q) {
    const query = (q || '').trim().toLowerCase();
    const matched = query ? items.filter(i => i.toLowerCase().includes(query)) : items;
    ddEl.innerHTML = '';
    const act = document.createElement('div');
    act.className = 'ms-actions';
    const bAll = document.createElement('button');
    bAll.textContent = query ? `全選符合項目 (${matched.length})` : '全選';
    const bNone = document.createElement('button');
    bNone.textContent = '清除全部';
    act.appendChild(bAll); act.appendChild(bNone);
    ddEl.appendChild(act);

    bAll.onclick = e => {
      e.stopPropagation();
      matched.forEach(i => selected.add(i));
      renderDD(q); renderChips(); updateCnt();
      applyFilter();
    };
    bNone.onclick = e => {
      e.stopPropagation();
      selected.clear();
      renderDD(q); renderChips(); updateCnt();
      applyFilter();
    };

    if (!matched.length) {
      const empty = document.createElement('div');
      empty.className = 'ms-empty';
      empty.textContent = '查無符合項目';
      ddEl.appendChild(empty);
      return;
    }
    matched.forEach(item => {
      const div = document.createElement('div');
      div.className = 'ms-item' + (selected.has(item) ? ' checked' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selected.has(item);
      cb.onclick = e => e.stopPropagation();
      cb.onchange = () => {
        if (cb.checked) selected.add(item); else selected.delete(item);
        div.classList.toggle('checked', cb.checked);
        renderChips(); updateCnt();
        applyFilter();
      };
      const lbl = document.createElement('span');
      lbl.textContent = item;
      div.appendChild(cb); div.appendChild(lbl);
      div.onclick = (e) => {
        if (e.target === cb) return;
        if (selected.has(item)) selected.delete(item); else selected.add(item);
        cb.checked = selected.has(item);
        div.classList.toggle('checked', cb.checked);
        renderChips(); updateCnt();
        applyFilter();
      };
      ddEl.appendChild(div);
    });
  }

  function renderChips() {
    chipsEl.innerHTML = '';
    selected.forEach(item => {
      const chip = document.createElement('span');
      chip.className = 'chip ' + chipClass;
      const label = item.replace(/^\d+\s/, '');
      chip.innerHTML = `${label}<span class="x" data-v="${item}">×</span>`;
      chip.querySelector('.x').onclick = () => {
        selected.delete(item);
        renderDD(qEl.value); renderChips(); updateCnt();
        applyFilter();
      };
      chipsEl.appendChild(chip);
    });
  }

  function updateCnt() {
    cntEl.textContent = selected.size ? `已選 ${selected.size}` : '';
  }

  function openDD() {
    document.querySelectorAll('.ms-dropdown.open').forEach(d => { if (d !== ddEl) d.classList.remove('open'); });
    renderDD(qEl.value);
    ddEl.classList.add('open');
  }

  qEl.addEventListener('focus', openDD);
  qEl.addEventListener('input', () => { openDD(); });
  document.getElementById('irow-' + key).addEventListener('click', () => qEl.focus());

  document.addEventListener('click', e => {
    if (!wrapEl.contains(e.target) && !chipsEl.contains(e.target)) ddEl.classList.remove('open');
  });

  return {
    getSelected: () => [...selected],
    clear: () => { selected.clear(); renderDD(''); renderChips(); updateCnt(); qEl.value = ''; }
  };
}

let chartW = null, chartV = null, chartU = null;
let chartSpW = null, chartSpV = null, chartSpU = null;
let chartTyW = null, chartTyV = null, chartTyU = null;
let chartTrendW = null, chartTrendV = null, chartTrendU = null;

function fmtN(n) { return Math.round(n).toLocaleString(); }
function fmtW(n) { return parseFloat(n.toFixed(3)).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 3}); }
function pct(a, b) {
  if (!b || b === 0) return '—';
  const d = ((a - b) / b * 100).toFixed(1);
  return (d > 0 ? '+' : '') + d + '%';
}

function groupByTargetCustom(rows, key, tStart, tEnd, bStart, bEnd) {
  const map = {};
  rows.forEach(r => {
    const k = r[key];
    const ym = r.year * 100 + r.month;
    if (!map[k]) map[k] = {label: k, wTarg: 0, vTarg: 0, wComp: 0, vComp: 0};
    
    if (ym >= tStart && ym <= tEnd) { map[k].wTarg += r.weight; map[k].vTarg += r.value; }
    if (ym >= bStart && ym <= bEnd) { map[k].wComp += r.weight; map[k].vComp += r.value; }
  });
  
  const results = Object.values(map);
  results.forEach(g => {
    g.uTarg = g.wTarg > 0 ? (g.vTarg / g.wTarg) : 0;
    g.uComp = g.wComp > 0 ? (g.vComp / g.wComp) : 0;
  });
  return results;
}

function aggregate(rows) {
  const map = {};
  rows.forEach(r => {
    const k = r.country + '|' + r.species + '|' + r.stype + '|' + r.year + '|' + r.month;
    if (!map[k]) map[k] = {...r, weight: 0, value: 0};
    map[k].weight += r.weight; map[k].value += r.value;
  });
  return Object.values(map);
}

function getYmSequence(start, end) {
  let seq = [];
  let y = Math.floor(start/100), m = start%100;
  let ey = Math.floor(end/100), em = end%100;
  while(y < ey || (y === ey && m <= em)) {
      seq.push(y*100 + m);
      m++; if(m>12){m=1;y++;}
  }
  return seq;
}

function applyFilter() {
  const io = document.getElementById('f-io').value;
  
  let tSy = parseInt(document.getElementById('t-start-yr').value, 10);
  let tSm = parseInt(document.getElementById('t-start-mo').value, 10);
  let tEy = parseInt(document.getElementById('t-end-yr').value, 10);
  let tEm = parseInt(document.getElementById('t-end-mo').value, 10);
  let tStart = tSy * 100 + tSm;
  let tEnd = tEy * 100 + tEm;
  if (tStart > tEnd) { const tmp = tStart; tStart = tEnd; tEnd = tmp; }

  let bSy = parseInt(document.getElementById('b-start-yr').value, 10);
  let bSm = parseInt(document.getElementById('b-start-mo').value, 10);
  let bEy = parseInt(document.getElementById('b-end-yr').value, 10);
  let bEm = parseInt(document.getElementById('b-end-mo').value, 10);
  let bStart = bSy * 100 + bSm;
  let bEnd = bEy * 100 + bEm;
  if (bStart > bEnd) { const tmp = bStart; bStart = bEnd; bEnd = tmp; }

  const selSp = new Set(msSp.getSelected());
  const selCo = new Set(msCo.getSelected());
  const selTy = new Set(msTy.getSelected());

  const baseRows = data.filter(r => {
    if (io && !r.io.includes(io)) return false;
    if (selSp.size > 0 && !selSp.has(r.species)) return false;
    if (selCo.size > 0 && !selCo.has(r.country)) return false;
    if (selTy.size > 0 && !selTy.has(r.stype)) return false;
    
    const m = r.month || 1;
    const ym = r.year * 100 + m;
    const inTarget = (ym >= tStart && ym <= tEnd);
    const inBase = (ym >= bStart && ym <= bEnd);
    
    return inTarget || inBase;
  });

  const tStr = `${Math.floor(tStart/100)}/${String(tStart%100).padStart(2,'0')}~${Math.floor(tEnd/100)}/${String(tEnd%100).padStart(2,'0')}`;
  const bStr = `${Math.floor(bStart/100)}/${String(bStart%100).padStart(2,'0')}~${Math.floor(bEnd/100)}/${String(bEnd%100).padStart(2,'0')}`;

  document.getElementById('status').textContent = `篩選出 ${baseRows.length} 筆資料 (當期/基期交集)`;

  const chartsToDestroy = [chartW, chartV, chartU, chartSpW, chartSpV, chartSpU, chartTyW, chartTyV, chartTyU, chartTrendW, chartTrendV, chartTrendU];
  
  if (!baseRows.length) {
    document.getElementById('metrics').innerHTML = '';
    document.getElementById('tbl').innerHTML = '<div class="no-result">無符合資料，請調整篩選條件</div>';
    chartsToDestroy.forEach(c => { if(c) c.destroy(); });
    return;
  }

  // ── Metrics table ──
  let twTarget = 0, tvTarget = 0, twCompare = 0, tvCompare = 0;

  baseRows.forEach(r => {
    const m = r.month || 1;
    const ym = r.year * 100 + m;
    if (ym >= tStart && ym <= tEnd) { 
      twTarget += r.weight; tvTarget += r.value; 
    }
    if (ym >= bStart && ym <= bEnd) { 
      twCompare += r.weight; tvCompare += r.value; 
    }
  });

  function diffCellW(a, b) {
    const d = a - b;
    const cls = d > 0 ? 'up' : d < 0 ? 'dn' : 'neu';
    const sign = d > 0 ? '+' : (d < 0 ? '-' : '');
    return `<span class="${cls}">${sign}${fmtW(Math.abs(d))}</span><br><span class="${cls}" style="font-size:12px;font-weight:400">${pct(a, b)}</span>`;
  }
  function diffCellV(a, b) {
    const d = a - b;
    const cls = d > 0 ? 'up' : d < 0 ? 'dn' : 'neu';
    const sign = d > 0 ? '+' : (d < 0 ? '-' : '');
    return `<span class="${cls}">${sign}${fmtN(Math.abs(d))}</span><br><span class="${cls}" style="font-size:12px;font-weight:400">${pct(a, b)}</span>`;
  }

  let thead = '<tr><th></th>';
  thead += `<th>${bStr} (基期)</th>`;
  thead += `<th>${tStr} (當期)</th>`;
  thead += `<th>差額 / 同期成長率</th>`;
  thead += '</tr>';

  let wRow = '<tr><td>重量<br><span style="font-size:11px;color:#888;">(噸)</span></td>';
  wRow += `<td>${fmtW(twCompare)}</td>`;
  wRow += `<td>${fmtW(twTarget)}</td>`;
  wRow += `<td style="line-height:1.4">${diffCellW(twTarget, twCompare)}</td>`;
  wRow += '</tr>';

  let vRow = '<tr><td>金額<br><span style="font-size:11px;color:#888;">(千元)</span></td>';
  vRow += `<td>${fmtN(tvCompare)}</td>`;
  vRow += `<td>${fmtN(tvTarget)}</td>`;
  vRow += `<td style="line-height:1.4">${diffCellV(tvTarget, tvCompare)}</td>`;
  vRow += '</tr>';

  const upCompare = twCompare > 0 ? (tvCompare * 1000) / (twCompare * 1000) : 0;
  const upTarget = twTarget > 0 ? (tvTarget * 1000) / (twTarget * 1000) : 0;
  function fmtUp(n) { return n > 0 ? n.toFixed(1) : '—'; }
  function diffCellUp(a, b) {
    const d = a - b;
    const cls = d > 0 ? 'up' : d < 0 ? 'dn' : 'neu';
    const sign = d > 0 ? '+' : (d < 0 ? '-' : '');
    return `<span class="${cls}">${sign}${Math.abs(d).toFixed(1)}</span><br><span class="${cls}" style="font-size:12px;font-weight:400">${pct(a, b)}</span>`;
  }

  let uRow = '<tr><td>單價<br><span style="font-size:11px;color:#888;">(元/公斤)</span></td>';
  uRow += `<td>${fmtUp(upCompare)}</td>`;
  uRow += `<td>${fmtUp(upTarget)}</td>`;
  uRow += `<td style="line-height:1.4">${(twCompare > 0 && twTarget > 0) ? diffCellUp(upTarget, upCompare) : '—'}</td>`;
  uRow += '</tr>';

  let ioLabel = "進出口"; 
  if (io === "出口") ioLabel = "出口";
  if (io === "進口") ioLabel = "進口";

  const metricTitle = `🎯 水產品${ioLabel}貿易統計`;
  
  // 專家優化：將表格用 .table-responsive 包裝，啟用橫向滑動
  document.getElementById('metrics').innerHTML =
    `<div style="font-size:18px; font-weight:800; color:#0f172a; margin-bottom:12px; padding-left:4px; letter-spacing:0.5px;">${metricTitle}</div>
     <div class="table-responsive">
       <table class="metric-table"><thead>${thead}</thead><tbody>${wRow}${vRow}${uRow}</tbody></table>
     </div>`;

  // ── 折線圖資料準備 ──
  chartsToDestroy.forEach(c => { if(c) c.destroy(); });
  
  const targYMs = getYmSequence(tStart, tEnd);
  const compYMs = getYmSequence(bStart, bEnd);
  const maxLen = Math.max(targYMs.length, compYMs.length);
  
  const trendLabels = [];
  for(let i=0; i<maxLen; i++) {
      let tM = targYMs[i] ? targYMs[i]%100 : null;
      let cM = compYMs[i] ? compYMs[i]%100 : null;
      if (tM && cM && tM === cM) {
          trendLabels.push(`${tM}月`);
      } else {
          trendLabels.push(`第${i+1}期`);
      }
  }

  const getVal = (yms, k) => yms.map(ym => {
    if(!ym) return null;
    return baseRows.filter(r => (r.year*100+(r.month||1))===ym).reduce((s, r)=>s+r[k], 0);
  });
  
  const trendDataTargW = getVal(targYMs, 'weight');
  const trendDataTargV = getVal(targYMs, 'value');
  const trendDataCompW = getVal(compYMs, 'weight');
  const trendDataCompV = getVal(compYMs, 'value');

  const trendDataTargU = trendDataTargW.map((w, i) => w > 0 ? (trendDataTargV[i] / w) : null);
  const trendDataCompU = trendDataCompW.map((w, i) => w > 0 ? (trendDataCompV[i] / w) : null);

  const commonLineOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 11 } } } } };

  chartTrendW = new Chart(document.getElementById('cTrendW'), {
    type: 'line',
    data: { 
      labels: trendLabels, 
      datasets: [
        { label: `基期`, data: trendDataCompW, borderColor: '#93b8e0', backgroundColor: '#93b8e0', tension: 0.3, spanGaps: true },
        { label: `當期`, data: trendDataTargW, borderColor: '#3266ad', backgroundColor: '#3266ad', tension: 0.3, spanGaps: true }
      ] 
    }, options: commonLineOptions
  });
  
  chartTrendV = new Chart(document.getElementById('cTrendV'), {
    type: 'line',
    data: { 
      labels: trendLabels, 
      datasets: [
        { label: `基期`, data: trendDataCompV, borderColor: '#f4a7c4', backgroundColor: '#f4a7c4', tension: 0.3, spanGaps: true },
        { label: `當期`, data: trendDataTargV, borderColor: '#d4537e', backgroundColor: '#d4537e', tension: 0.3, spanGaps: true }
      ] 
    }, options: commonLineOptions
  });

  chartTrendU = new Chart(document.getElementById('cTrendU'), {
    type: 'line',
    data: { 
      labels: trendLabels, 
      datasets: [
        { label: `基期`, data: trendDataCompU, borderColor: '#fcd34d', backgroundColor: '#fcd34d', tension: 0.3, spanGaps: true },
        { label: `當期`, data: trendDataTargU, borderColor: '#d97706', backgroundColor: '#d97706', tension: 0.3, spanGaps: true }
      ] 
    }, options: { ...commonLineOptions, scales: { y: { ticks: { callback: v => v.toFixed(1) } } } }
  });

  // ── 柱狀圖 (3x3 矩陣) ──
  const spList = [...selSp];
  const tyList = [...selTy];
  const coList = [...selCo]; 

  const spLabel = spList.length ? spList.map(s => s.replace(/^\d+\s/, '')).join('、') : '全魚種';
  const tyLabel = tyList.length ? tyList.map(t => t.replace(/^\d+\s/, '')).join('、') : '全類型';
  const coLabel = coList.length ? coList.map(c => c.replace(/^[A-Z]{2}\s/, '')).join('、') : '全市場';
  const rankLabel = `(前 10 大)`;
  
  document.getElementById('ct-w').textContent = `重量（噸）｜${spLabel} / ${tyLabel} ${rankLabel}`;
  document.getElementById('ct-v').textContent = `金額（千元）`;
  document.getElementById('ct-u').textContent = `單價（元/公斤）`;
  
  document.getElementById('ct-sp-w').textContent = `魚種重量（噸）｜${coLabel} / ${tyLabel} ${rankLabel}`;
  document.getElementById('ct-sp-v').textContent = `魚種金額（千元）`;
  document.getElementById('ct-sp-u').textContent = `魚種單價（元/公斤）`;

  document.getElementById('ct-ty-w').textContent = `類型重量（噸）｜${coLabel} / ${spLabel} ${rankLabel}`;
  document.getElementById('ct-ty-v').textContent = `類型金額（千元）`;
  document.getElementById('ct-ty-u').textContent = `類型單價（元/公斤）`;

  function mkChart(id, groupedData, kComp, kTarg, cComp, cTarg, labelFormatter, isDecimal = false) {
    const labels = groupedData.map(g => labelFormatter(g.label));
    return new Chart(document.getElementById(id), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: `基期`, data: groupedData.map(g => parseFloat(g[kComp].toFixed(isDecimal ? 1 : 3))), backgroundColor: cComp },
          { label: `當期`, data: groupedData.map(g => parseFloat(g[kTarg].toFixed(isDecimal ? 1 : 3))), backgroundColor: cTarg }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 11 } } },
          tooltip: { callbacks: { label: function(context) { let val = context.raw; return context.dataset.label + ': ' + (isDecimal ? val.toFixed(1) : val.toLocaleString()); } } }
        },
        scales: {
          x: { ticks: { font: { size: 10 }, maxRotation: 35, autoSkip: false } },
          y: { ticks: { callback: v => isDecimal ? v.toFixed(1) : v.toLocaleString() } }
        }
      }
    });
  }

  const sortW = (a, b) => b.wTarg - a.wTarg;

  const groupedCo = groupByTargetCustom(baseRows, 'country', tStart, tEnd, bStart, bEnd).sort(sortW).slice(0, 10);
  chartW = mkChart('cW', groupedCo, 'wComp', 'wTarg', '#93b8e0', '#3266ad', l => l.replace(/^[A-Z]{2}\s/, ''));
  chartV = mkChart('cV', groupedCo, 'vComp', 'vTarg', '#f4a7c4', '#d4537e', l => l.replace(/^[A-Z]{2}\s/, ''));
  chartU = mkChart('cU', groupedCo, 'uComp', 'uTarg', '#fcd34d', '#d97706', l => l.replace(/^[A-Z]{2}\s/, ''), true);

  const groupedSp = groupByTargetCustom(baseRows, 'species', tStart, tEnd, bStart, bEnd).sort(sortW).slice(0, 10);
  chartSpW = mkChart('cSpW', groupedSp, 'wComp', 'wTarg', '#a7f3d0', '#16a34a', l => l.replace(/^\d+\s/, ''));
  chartSpV = mkChart('cSpV', groupedSp, 'vComp', 'vTarg', '#e9d5ff', '#9333ea', l => l.replace(/^\d+\s/, ''));
  chartSpU = mkChart('cSpU', groupedSp, 'uComp', 'uTarg', '#fcd34d', '#d97706', l => l.replace(/^\d+\s/, ''), true);

  const groupedTy = groupByTargetCustom(baseRows, 'stype', tStart, tEnd, bStart, bEnd).sort(sortW).slice(0, 10);
  chartTyW = mkChart('cTyW', groupedTy, 'wComp', 'wTarg', '#fde047', '#ca8a04', l => l.replace(/^\d+\s/, ''));
  chartTyV = mkChart('cTyV', groupedTy, 'vComp', 'vTarg', '#fed7aa', '#ea580c', l => l.replace(/^\d+\s/, ''));
  chartTyU = mkChart('cTyU', groupedTy, 'uComp', 'uTarg', '#fcd34d', '#d97706', l => l.replace(/^\d+\s/, ''), true);

  // ── Table ──
  const top10SpeciesNames = groupedSp.map(g => g.label); 
  
  const agg = aggregate(baseRows)
    .filter(r => top10SpeciesNames.includes(r.species))
    .sort((a, b) => {
      if (b.year !== a.year) return b.year - a.year; 
      return b.weight - a.weight; 
    });
    
  currentAggData = agg; 
  document.getElementById('tbl-title').textContent = `明細資料 (前 10 大魚種)`;

  const expRows = agg.filter(r => r.io.includes('出'));
  const impRows = agg.filter(r => r.io.includes('進'));

  function buildTbody(dataRows) {
    if (!dataRows.length) return '<tr><td colspan="8" class="no-result">無資料</td></tr>';
    return dataRows.map(r => `<tr>
      <td><span class="${r.io.includes('出') ? 'io-ex' : 'io-im'}">${r.io.includes('出') ? '出口' : '進口'}</span></td>
      <td>${r.year}</td>
      <td>${r.month ? r.month + '月' : '-'}</td>
      <td>${r.country}</td>
      <td>${r.species}</td>
      <td>${r.stype}</td>
      <td style="text-align:right">${fmtW(r.weight)}</td>
      <td style="text-align:right">${fmtN(r.value)}</td>
    </tr>`).join('');
  }

  // 專家優化：針對下方的明細表也加入 RWD 橫向捲動保護殼
  document.getElementById('tbl').innerHTML = `
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <button class="btn-ghost" id="btn-tab-ex" style="background:#dbeafe; color:#1e40af; border-color:#dbeafe;" onclick="switchTab('ex')">出口明細 (${expRows.length})</button>
      <button class="btn-ghost" id="btn-tab-im" onclick="switchTab('im')">進口明細 (${impRows.length})</button>
    </div>
    <div id="tab-ex" class="tab-pane">
      <div class="table-responsive">
        <table class="detail-tbl">
          <thead><tr><th>進出口</th><th>年度</th><th>月份</th><th>國家</th><th>魚種</th><th>類型</th><th style="text-align:right">重量(噸)</th><th style="text-align:right">金額(千元)</th></tr></thead>
          <tbody>${buildTbody(expRows)}</tbody>
        </table>
      </div>
    </div>
    <div id="tab-im" class="tab-pane" style="display:none;">
      <div class="table-responsive">
        <table class="detail-tbl">
          <thead><tr><th>進出口</th><th>年度</th><th>月份</th><th>國家</th><th>魚種</th><th>類型</th><th style="text-align:right">重量(噸)</th><th style="text-align:right">金額(千元)</th></tr></thead>
          <tbody>${buildTbody(impRows)}</tbody>
        </table>
      </div>
    </div>
  `;
}

function popSel(id, arr, defaultVal, suffix) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  arr.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; 
    opt.textContent = v + suffix;
    if(v === defaultVal) opt.selected = true;
    el.appendChild(opt);
  });
}

function resetAll() {
  document.getElementById('f-io').value = '';
  
  const years = [...new Set(data.map(d => d.year))].filter(y => y > 0).sort((a,b) => b-a);
  const maxYear = years.length > 0 ? years[0] : 113; 
  const minYear = years.length > 0 ? years[years.length - 1] : 105; 
  
  const maxMonthData = data.filter(d => d.year === maxYear).map(d => d.month || 1);
  const maxMonth = maxMonthData.length > 0 ? Math.max(...maxMonthData) : 12;

  document.getElementById('b-start-yr').value = minYear;
  document.getElementById('b-start-mo').value = 1;
  document.getElementById('b-end-yr').value = minYear;
  document.getElementById('b-end-mo').value = maxMonth;
  
  document.getElementById('t-start-yr').value = maxYear;
  document.getElementById('t-start-mo').value = 1;
  document.getElementById('t-end-yr').value = maxYear;
  document.getElementById('t-end-mo').value = maxMonth;

  if (msSp) msSp.clear();
  if (msCo) msCo.clear();
  if (msTy) msTy.clear();
  applyFilter();
}

function initApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';

  const years = [...new Set(data.map(d => d.year))].filter(y => y > 0).sort((a,b) => b-a);
  const maxYear = years.length > 0 ? years[0] : 113;
  const minYear = years.length > 0 ? years[years.length - 1] : 105;
  
  const maxMonthData = data.filter(d => d.year === maxYear).map(d => d.month || 1);
  const maxMonth = maxMonthData.length > 0 ? Math.max(...maxMonthData) : 12;
  const months = Array.from({length:12}, (_,i)=>i+1);

  if (document.getElementById('b-start-yr').options.length === 0) {
    popSel('b-start-yr', years, minYear, '年');
    popSel('b-start-mo', months, 1, '月');
    popSel('b-end-yr', years, minYear, '年');
    popSel('b-end-mo', months, maxMonth, '月');

    popSel('t-start-yr', years, maxYear, '年');
    popSel('t-start-mo', months, 1, '月');
    popSel('t-end-yr', years, maxYear, '年');
    popSel('t-end-mo', months, maxMonth, '月');
  }

  if(!msSp) msSp = buildMS('sp', species, 'chip-sp');
  if(!msCo) msCo = buildMS('co', countries, 'chip-co');
  if(!msTy) msTy = buildMS('ty', types, 'chip-ty');

  applyFilter();
}

    document.getElementById('btn-chart-' + t).classList.remove('active');
  });
  document.getElementById('pane-' + tab).classList.add('active');

};

window.switchTab = function(tab) {
  document.getElementById('tab-ex').style.display = tab === 'ex' ? 'block' : 'none';
  document.getElementById('tab-im').style.display = tab === 'im' ? 'block' : 'none';
  
  const btnEx = document.getElementById('btn-tab-ex');
  const btnIm = document.getElementById('btn-tab-im');
  
  if (tab === 'ex') {
    btnEx.style.cssText = 'background:#dbeafe; color:#1e40af; border-color:#dbeafe;';
    btnIm.style.cssText = '';
  } else {
    btnEx.style.cssText = '';
    btnIm.style.cssText = 'background:#fce7f3; color:#9d174d; border-color:#fce7f3;';
  }
};

function exportCSV() {
  if (!currentAggData || currentAggData.length === 0) {
    alert('目前沒有資料可以匯出！');
    return;
  }
  
  let csvContent = '\uFEFF'; 
  csvContent += '進出口,年度,月份,國家,貿易物種,商品類型,重量(公噸),金額(新臺幣千元)\n';
  
  currentAggData.forEach(r => {
    const safeSp = r.species.replace(/,/g, '，');
    const safeTy = r.stype.replace(/,/g, '，');
    csvContent += `${r.io},${r.year},${r.month ? r.month + '月' : ''},${r.country},${safeSp},${safeTy},${r.weight},${r.value}\n`;
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.setAttribute('href', url);
  link.setAttribute('download', `臺灣水產品貿易明細_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
